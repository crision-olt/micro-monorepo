name: Release

# Triggers when a PR from develop into main is merged
on:
  pull_request:
    branches: [main]
    types: [closed]

concurrency:
  group: release
  cancel-in-progress: false

env:
  NODE_VERSION: "22"

jobs:
  release:
    name: Build images & create release
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'develop'

    permissions:
      contents: write
      packages: write

    strategy:
      matrix:
        app: [heimdall, references-api]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Derive version from the root package.json (or a VERSION file if you prefer)
      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push — ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.app }}
          file: infra/containerfiles/Containerfile.${{ matrix.app }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Create the GitHub release once (only for the first matrix entry to avoid duplicates)
      - name: Create GitHub release
        if: matrix.app == 'heimdall'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          make_latest: true
